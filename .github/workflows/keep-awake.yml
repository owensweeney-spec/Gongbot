name: Keep Render Awake

on:
  schedule:
    # Run every 3 minutes to keep Render service awake
    # Cron syntax: minute hour day-of-month month day-of-week
    - cron: '*/3 * * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          # Use default URL if RENDER_URL is not set or empty
          if [ -z "$RENDER_URL" ]; then
            RENDER_URL="https://gongbot-e15s.onrender.com"
          fi
          echo "Pinging $RENDER_URL..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_URL")
          echo "Response code: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Render service is awake"
          else
            echo "❌ Render service returned: $RESPONSE"
          fi
        env:
          RENDER_URL: ${{ secrets.RENDER_URL }}
